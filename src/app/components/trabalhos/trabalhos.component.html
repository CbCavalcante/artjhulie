<section id="trabalhos">
  <div class="container">
    <h2>Trabalhos</h2>

    <div class="trabalhos-grid" *ngIf="artes.length > 0">
      
      <div class="info-column">
        
        <div *ngFor="let arte of artes; let i = index" 
             class="info-slide" 
             [class.active]="i === activeSlideIndex">
          
          <h4>{{ arte.titulo }}</h4>
          <p>{{ arte.descricao }}</p>
        </div>

        <div class="info-controls">
          <div class="carousel-indicators-manual">
            <span *ngFor="let arte of artes; let i = index"
                  [class.active]="i === activeSlideIndex">
            </span>
          </div>
          </div>

      </div>

      <div class="carousel-column">
        
        <carousel [interval]="5000" 
                  [showIndicators]="false" 
                  (activeSlideChange)="onActiveSlideChange($event)">
          
          <slide *ngFor="let arte of artes">
            <img [src]="arte.imagem" [alt]="arte.titulo" class="carousel-imagem">
          </slide>
        </carousel>

        <div class="manual-arrows">
          <button (click)="previousSlide()" aria-label="Slide anterior">
            <i class="fas fa-arrow-left"></i>
          </button>
          <button (click)="nextSlide()" aria-label="Próximo slide">
            <i class="fas fa-arrow-right"></i>
          </button>
        </div>

      </div>

    </div>
  </div>
</section>
