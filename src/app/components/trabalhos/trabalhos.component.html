<section id="trabalhos">
  <h2>Trabalhos</h2>
  
  <div class="container trabalhos-grid">
    
    <div class="info-column">
      <div class="info-slide" *ngFor="let arte of artes; let i = index" [class.active]="i === slideAtual">
        <h4>{{ arte.titulo }}</h4>
        <h5 [innerHTML]="arte.subtitulo" class="subtitulo-arte"></h5>
        <p>{{ arte.descricao }}</p>
        <a href="#contato" class="btn-reservar">Fazer Pedido</a>
      </div>
    </div>

    <div class="carousel-column" (mouseenter)="pararCarrosselAutomatico()" (mouseleave)="iniciarCarrosselAutomatico()">
      
      <div class="carousel-track" [style.transform]="'translateX(-' + slideAtual * 100 + '%)'">
        <div class="carousel-slide-img" *ngFor="let arte of artes">
          <img [src]="arte.imagem" [alt]="arte.titulo">
        </div>
      </div>

      <button class="nav-btn prev" (click)="slideAnterior()" aria-label="Anterior">&#10094;</button>
      <button class="nav-btn next" (click)="proximoSlide()" aria-label="Próximo">&#10095;</button>

      <div class="carousel-dots">
        <span 
          *ngFor="let dot of artes; let i = index" 
          class="dot"
          [class.active]="i === slideAtual" 
          (click)="irParaSlide(i)">
        </span>
      </div>

    </div>

  </div>
</section>
